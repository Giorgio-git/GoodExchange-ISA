version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: goodexchange_db
    restart: always
    environment:
      POSTGRES_DB: GoodExchange
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d GoodExchange"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goodexchange_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: GoodExchange
      PGUSER: postgres
      PGPASSWORD: postgres
      CORS_ORIGIN: http://localhost:4200
    ports:
      - "3000:3000"

volumes:
  postgres_data:
