<div class="login-container">
  <div class="login-card">
    
    <!-- Intestazione pulita e moderna -->
    <div class="login-header">
      <h2 class="login-title">Accedi alla Piattaforma</h2>
      <p class="login-subtitle">Bentornato su GoodExchange</p>
    </div>

    <!-- Form di login -->
    <form (ngSubmit)="login()" class="login-form">
      
      <!-- Campo Username -->
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input 
          type="text" 
          id="username"
          [(ngModel)]="username"
          name="username"
          required
          minlength="3"
          class="form-input"
          placeholder="es. mario.rossi">
      </div>

      <!-- Campo Password -->
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input 
          type="password" 
          id="password"
          [(ngModel)]="password"
          name="password"
          required
          minlength="4"
          class="form-input"
          placeholder="••••••••">
      </div>

      <!-- Messaggio di errore -->
      <div *ngIf="errore" class="error-message">
        {{ errore }}
      </div>

      <!-- Pulsanti d'azione -->
      <div class="form-actions">
        <button 
          type="submit" 
          class="btn btn-primary">
          Accedi
        </button>
        
        <button 
          type="button" 
          (click)="clearForm()"
          class="btn btn-secondary">
          Pulisci
        </button>
      </div>

      <!-- Link alla registrazione -->
      <div class="login-footer">
        <p class="signup-link">
          Non hai ancora un account? 
          <a routerLink="/signup" class="link">Registrati subito</a>
        </p>
      </div>

    </form>

  </div>
</div>
